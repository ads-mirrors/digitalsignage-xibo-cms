name: Test Suite

on:
  issue_comment:
    types: [created]

jobs:
  phpunit:
    name: Run PHPUnit
    if: github.event.issue.pull_request && contains(github.event.comment.body, 'TEST:')
    runs-on: ubuntu-latest

    steps:
      - name: Get branch of PR
        uses: xt0rted/pull-request-comment-branch@v1
        id: comment-branch

      - name: Set latest commit status as pending
        uses: myrotvorets/set-commit-status-action@master
        with:
          sha: ${{ steps.comment-branch.outputs.head_sha }}
          token: ${{ secrets.GITHUB_TOKEN }}
          status: pending

      - name: Checkout PR branch ${{ steps.comment-branch.outputs.head_ref }}
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.comment-branch.outputs.head_sha }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull
        run: |
          docker pull mysql:8.4
          docker pull ghcr.io/xibosignage/xibo-xmr:latest
          docker pull ghcr.io/xibosignage/xibo-cms:test-${{ github.event.issue.number }}

      - name: Run
        run: |
          docker run --name cms-db -e MYSQL_RANDOM_ROOT_PASSWORD=yes -e MYSQL_DATABASE=cms -e MYSQL_USER=cms -e MYSQL_PASSWORD=jenkins -d mysql:8.4
          docker run --name cms-xmr -d ghcr.io/xibosignage/xibo-xmr:latest
          docker run --name cms-web -e MYSQL_HOST=cms-db -e MYSQL_USER=cms -e MYSQL_PASSWORD=jenkins -e CMS_DEV_MODE=true -e XMR_HOST=cms-xmr -e CMS_USAGE_REPORT=false -e INSTALL_TYPE=ci -e MYSQL_BACKUP_ENABLED=false --link cms-db --link cms-xmr -d ghcr.io/xibosignage/xibo-cms:test-${{ github.event.issue.number }}

      - name: Wait for CMS
        run: |
          docker exec -t cms-web /bin/bash -c "/usr/local/bin/wait-for-command.sh -q -t 300 -c \"nc -z localhost 80\""
          docker cp cms-web:/var/www/cms/web/settings.php web/settings.php
          docker exec -t cms-web /bin/bash -c "chown -R www-data.www-data /var/www/cms"
          docker exec --user www-data -t cms-web /bin/bash -c "cd /var/www/cms; /usr/bin/php bin/run.php 1"
          sleep 5

      - name: Seed Database
        run: |
          docker exec cms-db mysql -ucms -pjenkins cms -e "UPDATE setting SET value=\"6v4RduQhaw5Q\" WHERE setting = \"SERVER_KEY\" "
          docker exec cms-db mysql -ucms -pjenkins cms -e "INSERT INTO task (name, class, status, isActive, configFile, options, schedule) VALUES ('Seed Database', '\\\\Xibo\\\\XTR\\\\SeedDatabaseTask', 2, 1, '/tasks/seed-database.task', '{}', '* * * * * *')"
          docker exec --user www-data -t cms-web /bin/bash -c "cd /var/www/cms; /usr/bin/php bin/run.php \"Seed Database\""
          sleep 5

      - name: Run PHPUnit
        run: |
          docker exec --user www-data -t cms-web /bin/bash -c "cd /var/www/cms; php vendor/bin/phpunit --log-junit results.xml"

      - name: Set latest commit status as ${{ job.status }}
        uses: myrotvorets/set-commit-status-action@master
        if: always()
        with:
          sha: ${{ steps.comment-branch.outputs.head_sha }}
          token: ${{ secrets.GITHUB_TOKEN }}
          status: ${{ job.status }}

  vitest:
    name: Run Vitest
    needs: phpunit
    if: github.event.issue.pull_request && contains(github.event.comment.body, 'TEST:')
    runs-on: ubuntu-latest

    steps:
      - name: Get branch of PR
        uses: xt0rted/pull-request-comment-branch@v1
        id: comment-branch

      - name: Set latest commit status as pending
        uses: myrotvorets/set-commit-status-action@master
        with:
          sha: ${{ steps.comment-branch.outputs.head_sha }}
          token: ${{ secrets.GITHUB_TOKEN }}
          status: pending

      - name: Checkout PR branch ${{ steps.comment-branch.outputs.head_ref }}
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.comment-branch.outputs.head_sha }}

      - name: Check Comment
        id: check_comment
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          # Detect --no-coverage flag
          if echo "$COMMENT_BODY" | grep -q '\-\-no-coverage'; then
            echo "with_coverage=false" >> $GITHUB_ENV
            COMMENT_BODY="${COMMENT_BODY/--no-coverage/}"
          else
            echo "with_coverage=true" >> $GITHUB_ENV
          fi

          COMMENT_BODY="$(echo "$COMMENT_BODY" | xargs)"

          if [[ "$COMMENT_BODY" =~ ^TEST:\ *(all|\*)?$ ]]; then
            echo "test_pattern=" >> $GITHUB_ENV
          elif [[ "$COMMENT_BODY" =~ ^TEST:\ *(.+)$ ]]; then
            raw="${BASH_REMATCH[1]}"
            IFS=',' read -ra parts <<< "$raw"
            patterns=()
            for p in "${parts[@]}"; do
              patterns+=("$(echo "$p" | xargs)")
            done
            echo "test_pattern=${patterns[*]}" >> $GITHUB_ENV
          else
            echo "Comment does not match expected format. Use: TEST: all, TEST: Layout, or TEST: Layout, Displays"
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Run Vitest with coverage
        if: env.with_coverage == 'true'
        working-directory: frontend
        run: npm run test:ci -- ${{ env.test_pattern }}

      - name: Run Vitest without coverage
        if: env.with_coverage == 'false'
        working-directory: frontend
        run: npx vitest run ${{ env.test_pattern }}

      - name: Upload coverage report
        if: env.with_coverage == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: vitest-coverage-report
          path: frontend/coverage

      - name: Set latest commit status as ${{ job.status }}
        uses: myrotvorets/set-commit-status-action@master
        if: always()
        with:
          sha: ${{ steps.comment-branch.outputs.head_sha }}
          token: ${{ secrets.GITHUB_TOKEN }}
          status: ${{ job.status }}

  comment:
    name: Post Result Comment
    needs: [phpunit, vitest]
    if: always() && github.event.issue.pull_request && contains(github.event.comment.body, 'TEST:')
    runs-on: ubuntu-latest
    steps:
      - name: Add workflow result as comment on PR
        uses: actions/github-script@v6
        with:
          script: |
            const phpunit = '${{ needs.phpunit.result }}';
            const vitest = '${{ needs.vitest.result }}';
            const url = '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}';

            let body;
            if (phpunit === 'success' && vitest === 'success') {
              body = `Test Suite: succeeded ✅\n${url}`;
            } else if (phpunit !== 'success') {
              body = `Test Suite: failed ❌ (PHPUnit ${phpunit})\n${url}`;
            } else {
              body = `Test Suite: failed ❌ (Vitest ${vitest})\n${url}`;
            }

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            })
